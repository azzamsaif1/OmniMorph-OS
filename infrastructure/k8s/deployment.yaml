apiVersion: apps/v1
kind: Deployment
metadata:
  name: ucsk-backend
  labels:
    app: ucsk
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ucsk
      component: backend
  template:
    metadata:
      labels:
        app: ucsk
        component: backend
    spec:
      containers:
        - name: backend
          image: ucsk/backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: UCSK_HOST
              value: "0.0.0.0"
            - name: UCSK_PORT
              value: "8000"
            - name: UCSK_QDRANT_HOST
              value: "qdrant-service"
            - name: UCSK_NEO4J_URI
              value: "bolt://neo4j-service:7687"
            - name: UCSK_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: ucsk-secrets
                  key: postgres-dsn
            - name: UCSK_REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: UCSK_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ucsk-secrets
                  key: gemini-api-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ucsk-frontend
  labels:
    app: ucsk
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ucsk
      component: frontend
  template:
    metadata:
      labels:
        app: ucsk
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ucsk/frontend:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  labels:
    app: ucsk
    component: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ucsk
      component: qdrant
  template:
    metadata:
      labels:
        app: ucsk
        component: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.2
          ports:
            - containerPort: 6333
              protocol: TCP
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: qdrant-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  labels:
    app: ucsk
    component: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ucsk
      component: neo4j
  template:
    metadata:
      labels:
        app: ucsk
        component: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-community
          ports:
            - containerPort: 7474
              protocol: TCP
            - containerPort: 7687
              protocol: TCP
          env:
            - name: NEO4J_AUTH
              value: "neo4j/ucsk_secret"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: ucsk
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ucsk
      component: redis
  template:
    metadata:
      labels:
        app: ucsk
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
