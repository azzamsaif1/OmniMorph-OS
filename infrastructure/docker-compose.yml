# UCSK Infrastructure — local development stack
# Usage: docker compose up -d

services:
  # --- Backend API ---
  backend:
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      UCSK_QDRANT_HOST: qdrant
      UCSK_NEO4J_URI: bolt://neo4j:7687
      UCSK_POSTGRES_DSN: postgresql+asyncpg://ucsk:ucsk@postgres:5432/ucsk
      UCSK_REDIS_URL: redis://redis:6379/0
    depends_on:
      - qdrant
      - neo4j
      - postgres
      - redis
    volumes:
      - ../backend:/app/backend
    restart: unless-stopped

  # --- Frontend (dev server) ---
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped

  # --- Qdrant (Vector DB) ---
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # --- Neo4j (Graph DB) ---
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ucsk_secret
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # --- PostgreSQL (Event Store) ---
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ucsk
      POSTGRES_PASSWORD: ucsk
      POSTGRES_DB: ucsk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Redis (Agent Bus) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  postgres_data:
  redis_data:
